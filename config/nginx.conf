server {
    listen 80;
    server_name _;
    root /var/www/html;
    index index.php;

    client_max_body_size 64M;

    # WordPress permalinks: fall through to index.php when no file matches.
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # PHP handled by the php-fpm container over the docker network.
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;
    }

    # Block direct access to sensitive files that may end up in the document
    # root (generated wp-config.php, debug logs under wp-content).
    location ~* /(?:wp-config\.php|wp-content/.*\.(?:env|log)) {
        deny all;
    }

    # Long-cache static assets.
    location ~* \.(?:css|js|gif|jpe?g|png|webp|svg|ico|woff2?)$ {
        expires 30d;
        access_log off;
        try_files $uri =404;
    }
}
